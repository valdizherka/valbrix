<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080" />
<title>Post 01 — Brand Intro</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #04060f;
    font-family: 'Inter', sans-serif;
    color: white;
  }

  .canvas {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #04060f 0%, #07091a 50%, #04060f 100%);
  }

  /* Grid background */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(99,102,241,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,0.05) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  /* Glow orbs */
  .orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    pointer-events: none;
  }
  .orb-blue  { background: radial-gradient(circle, rgba(37,99,235,0.45) 0%, transparent 70%); }
  .orb-purple{ background: radial-gradient(circle, rgba(124,58,237,0.35) 0%, transparent 70%); }
  .orb-gold  { background: radial-gradient(circle, rgba(212,160,23,0.2) 0%, transparent 70%); }

  /* Corner decorative lines */
  .corner-tl, .corner-br {
    position: absolute;
    width: 80px;
    height: 80px;
  }
  .corner-tl { top: 60px; left: 60px; border-top: 1.5px solid rgba(212,160,23,0.4); border-left: 1.5px solid rgba(212,160,23,0.4); }
  .corner-br { bottom: 60px; right: 60px; border-bottom: 1.5px solid rgba(212,160,23,0.4); border-right: 1.5px solid rgba(212,160,23,0.4); }

  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 100px 90px;
    text-align: center;
  }

  /* Badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 10px 22px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #93c5fd;
    background: rgba(59,130,246,0.1);
    border: 1px solid rgba(59,130,246,0.25);
    margin-bottom: 48px;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #22d3ee;
    box-shadow: 0 0 10px #22d3ee, 0 0 24px rgba(34,211,238,0.5);
  }

  /* Headline */
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 92px;
    font-weight: 700;
    line-height: 1.0;
    letter-spacing: -0.02em;
    margin-bottom: 36px;
    color: white;
  }
  h1 .gold {
    background: linear-gradient(135deg, #c8850a 0%, #e9a820 40%, #d4a017 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Subtext */
  .sub {
    font-size: 22px;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    line-height: 1.6;
    max-width: 680px;
    margin-bottom: 64px;
  }

  /* Pills */
  .pills {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 72px;
  }
  .pill {
    padding: 10px 22px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    color: rgba(255,255,255,0.65);
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
  }

  /* Logo area */
  .logo-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .logo-divider {
    width: 40px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,160,23,0.5), transparent);
    margin-bottom: 16px;
  }
  .logo-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 600;
    letter-spacing: -0.01em;
    background: linear-gradient(135deg, #c8850a, #e9a820, #d4a017);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo-sub {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    font-weight: 500;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="grid-bg"></div>

  <!-- Orbs -->
  <div class="orb orb-blue"  style="width:600px;height:600px;top:-100px;left:-100px;opacity:0.5;"></div>
  <div class="orb orb-purple"style="width:500px;height:500px;bottom:-100px;right:-100px;opacity:0.4;"></div>
  <div class="orb orb-gold"  style="width:400px;height:400px;bottom:100px;left:200px;opacity:0.6;"></div>

  <!-- Corner accents -->
  <div class="corner-tl"></div>
  <div class="corner-br"></div>

  <!-- Content -->
  <div class="content">
    <div class="badge"><div class="dot"></div> Digital Marketing Agency</div>

    <h1>
      More Growth.<br/>
      More Clients.<br/>
      <span class="gold">More Revenue.</span>
    </h1>

    <p class="sub">
      We help ambitious businesses grow online through strategy,
      paid ads, social media, and content that converts.
    </p>

    <div class="pills">
      <div class="pill">⚡ Performance-Driven</div>
      <div class="pill">🎯 Strategy-First</div>
      <div class="pill">📈 Results-Focused</div>
      <div class="pill">💬 Always Accessible</div>
    </div>

    <div class="logo-row">
      <div class="logo-divider"></div>
      <div class="logo-name">valbrix</div>
      <div class="logo-sub">digital</div>
    </div>
  </div>
</div>
</body>
</html>
